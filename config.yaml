# ═══════════════════════════════════════════════════════════════════════════
# Chinese MFA Pipeline — 参考配置 / 内置默认值
# ═══════════════════════════════════════════════════════════════════════════
#
# 任务配置文件只需写与默认值不同的字段 (通常只需要 workspace + data_dir).
# 运行: python scripts/run_pipeline.py --config config.yaml
#       python scripts/run_pipeline.py --config configs/xiaoyuan5.yaml
#
# 所有字段都有内置默认值 (见 run_pipeline.py::DEFAULT_CFG).
# 以下列出的是默认值, 注释掉表示使用默认即可.

# ── 必填 (无默认值) ──────────────────────────────────────────────────────
# workspace: my_task           # 工作区名 (相对路径 = 相对于当前目录)
# data_dir: data_dir/my_task   # 输入目录, 含 wav + txt

# ── 输出子目录 (相对于 workspace) ────────────────────────────────────────
# audio_dir: audio
# pinyin_dir: pinyin
# aligned_dir: aligned
# output_dir: output
# filtered_dir: filtered
# validate_dir: validate
# temp_dir: temp
# ctc_pretg: ctc_pretg
# ctc_pretg_adj: ctc_pretg_adj

# ── 模型 & 词典 (相对于项目根) ──────────────────────────────────────────
# models_dir: models/mfa
# acoustic_model: mandarin_mfa
# mfa_dict: dict/mfa_ipa.dict
# pinyin_dict: dict/fullpinyin_enword.dict
# python_path: ""              # 空 = 自动检测 conda env

