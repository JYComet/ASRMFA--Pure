# Chinese MFA Pipeline Configuration
# ====================================
# All paths are relative to the project root (chinese_mfa_pipeline/).
# Absolute paths also work if you prefer to keep data elsewhere.
# CLI arguments (--data-dir, --output-dir, --python) override these values.

# ---- Workspace (all generated data goes here) ----
workspace: workspace

# ---- Input ----
data_dir: data_dir                  # Source directory (wav + txt in subdirs)
txt_suffix:                         # Only match txt files with this suffix (e.g. qwen3-api)

# ---- Output directories (relative to workspace) ----
audio_dir: audio                    # Trimmed WAV
pinyin_dir: pinyin                  # Chinese text converted to pinyin
aligned_dir: aligned                # Raw MFA alignment TextGrids
output_dir: output                  # Final TextGrids (passed QC)
filtered_dir: filtered              # TextGrids that failed QC
validate_dir: validate              # MFA validation output
temp_dir: temp                      # MFA temporary files

# ---- Model & Dictionary (relative to project root) ----
models_dir: models/mfa              # MFA model root
acoustic_model: mandarin_mfa        # MFA acoustic model name
mfa_dict: dict/mfa_ipa.dict         # Pronunciation dictionary
pinyin_dict: dict/fullpinyin_enword.dict  # Source pinyin dictionary

# ---- Python environment (auto-detect if empty) ----
python_path: ""                     # Path to Python with MFA installed. Empty = auto-detect from conda envs.

# ---- Step 1: Trim Silence ----
trim:
  max_silence_sec: 1.0
  sil_vol_threshold: 0.005
  sil_len_threshold: 0.08
  normalize_edges: true
  target_edge_silence_sec: 0.5
  edge_silence_threshold: 0.001
  edge_frame_length: 1024
  target_sr: null
  workers: 8

# ---- Step 2: Prepare Corpus ----
prepare:
  copy_wav: false
  keep_punctuation: true

# ---- CTC directories (relative to workspace) ----
ctc_pretg: ctc_pretg
ctc_pretg_adj: ctc_pretg_adj

# ---- Step 4: CTC Pre-alignment (NVASR -> MFA anchors) ----
ctc_prealign:
  enabled: true
  model_path: "models/Multilingual-NVASR"   # relative to project root
  device: cuda:0
  python: ""                                # Python with funasr+torch. Empty = use current Python.
  limit: 0
  timeout: 3600

# ---- Step 5: Energy-based CTC boundary adjustment ----
ctc_adjust:
  enabled: true
  limit: 0

# ---- Step 6 & 7: MFA ----
mfa:
  num_jobs: 8
  single_speaker: true
  output_format: long_textgrid
  clean: true
  no_tokenization: true

# ---- Step 8: Postprocess ----
postprocess:
  merge_silence: true
  min_sil_merge_sec: 0.2
  fix_short_word: true
  short_word_max_sec: 0.25
  flank_silence_sec: 0.4
  short_word_search_window: 0.5
  detect_bgm: true
  bgm_noise_floor_ratio: 2.0
  bgm_min_sil_dur: 0.3
  bgm_speech_ratio: 1.0
  bgm_min_energy: 0.01
  filter_suspicious: true
  filter_short_phone_sec: 0.005
  filter_long_word_sec: 1.5
  filter_min_word_sec: 0.15
  filter_min_word_dur_sec: 0.02
  filter_word_energy_ratio: 2.0
  filter_min_phone_coverage: 0.25
  filter_edge_gap_sec: 0.35
  filter_flank_silence_sec: 0.4
  filter_long_consonant_sec: 999.0
  filter_long_vowel_sec: 999.0
  enable_text_correction: true
  handle_unexpected_sil: false
