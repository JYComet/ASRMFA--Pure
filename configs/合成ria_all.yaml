# 合成ria — ctc_ready 模式 (音频已预补静音, NVASR CTC 已跑完)
# 处理整个文件夹全部文件
#
# 跨平台兼容: Windows UNC 路径在 Linux 上自动映射到 SMB 挂载点
# Windows: \\RS3621\Research_TTS\Data\Raw  →  Linux: /mnt/Raw

mode: ctc_ready
workspace: hechengria_all

# 预处理后的音频目录 (已补全静音)
data_dir: \\RS3621\Research_TTS\Data\Raw\v5_0707\合成ria\wavs

ctc_ready:
  # NVASR CTC 输出目录 (.lab .TextGrid _tokens.jsonl _punct.json _text_cn.txt _text_raw.txt)
  # 支持嵌套结构: dir/{stem}/{stem}.lab
  ctc_dir: \\RS3621\Research_TTS\Data\Raw\ASRNEW\合成ria\wavs
  require_all: true
  stem_prefix: "合成ria_"

# MFA 对齐参数
mfa:
  num_jobs: 8
  single_speaker: true

# 后处理参数
postprocess:
  filter_suspicious: true
  enable_text_correction: true
  handle_unexpected_sil: true

# 输出目录 (最终处理结果)
# → \\RS3621\Research_TTS\Data\Raw\ASR_MFA  (Linux: /mnt/Raw/ASR_MFA)
output_dir: \\RS3621\Research_TTS\Data\Raw\ASR_MFA\hechengria_all
