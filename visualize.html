<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio Annotation Viewer — CTC 帧级时间戳可视化</title>
<style>
:root {
  --bg: #e8e8e8; --panel-bg: #fff; --text: #222; --text-dim: #777;
  --ruler-bg: #e0e0e0; --ruler-text: #555;
  --playhead-color: #e74c3c;
  --word-bg: #fff; --word-border: #bdbdbd; --word-text: #222;
  --punct-bg: #fff9c4; --punct-border: #f9a825; --punct-text: #827717;
  --nvv-bg: #c8e6c9; --nvv-border: #43a047; --nvv-text: #1b5e20;
  --pause-bg: #eceff1; --pause-border: #90a4ae; --pause-text: #546e7a;
  --special-bg: #e1bee7; --special-border: #ab47bc; --special-text: #6a1b9a;
  --tier-label-bg: #f5f5f5;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
  background: var(--bg); color: var(--text);
  height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  user-select: none; -webkit-user-select: none;
}

/* Header */
#header {
  display: flex; align-items: center; gap: 10px;
  padding: 5px 14px; background: #fff; border-bottom: 1px solid #ddd;
  min-height: 36px; flex-shrink: 0; font-size: 13px;
}
#file-name { font-weight: 700; max-width: 500px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#file-meta { font-size: 11px; color: var(--text-dim); }
#header .badge { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 600; }
.badge-nvv  { background: #c8e6c9; color: #2e7d32; }
.badge-none { background: #f5f5f5; color: #999; }

/* Controls */
#controls {
  display: flex; align-items: center; gap: 5px; padding: 4px 12px;
  background: #fafafa; border-bottom: 1px solid #e0e0e0; flex-shrink: 0;
  min-height: 34px; flex-wrap: wrap;
}
#controls button {
  border: 1px solid #ccc; background: #fff; border-radius: 4px;
  padding: 4px 10px; cursor: pointer; font-size: 12px; white-space: nowrap;
  transition: background 0.15s;
}
#controls button:hover { background: #e8e8e8; }
#controls button.active { background: #3498db; color: #fff; border-color: #3498db; }
#controls .sep { width: 1px; height: 18px; background: #ddd; margin: 0 4px; }
#controls .time-display {
  font-family: 'Consolas','Courier New',monospace; font-size: 13px; font-weight: 600;
  padding: 3px 10px; background: #fff; border: 1px solid #ddd; border-radius: 3px;
  min-width: 190px; text-align: center; letter-spacing: 1px;
}
#controls label { font-size: 11px; display: flex; align-items: center; gap: 2px; cursor: pointer; }
#controls input[type=range] { width: 60px; cursor: pointer; }
.zoom-pct { font-size: 10px; color: var(--text-dim); min-width: 40px; text-align: center; }

/* Canvas */
#canvas-wrap { flex: 1; overflow: hidden; position: relative; cursor: crosshair; }
canvas { display: block; position: absolute; top: 0; left: 0; image-rendering: auto; }

/* Tooltip */
#tooltip {
  position: fixed; pointer-events: none; z-index: 100;
  background: rgba(20,20,30,0.92); color: #fff; font-size: 12px;
  padding: 6px 10px; border-radius: 6px; display: none; white-space: nowrap;
  font-family: 'Consolas','Microsoft YaHei',monospace; line-height: 1.6;
  box-shadow: 0 3px 12px rgba(0,0,0,0.3);
}

/* Drop overlay */
#drop-overlay {
  position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; background: rgba(240,240,240,0.97); z-index: 50;
  flex-direction: column; gap: 14px;
}
#drop-overlay.hidden { display: none; }
#drop-zone {
  border: 3px dashed #bbb; border-radius: 14px; padding: 40px 70px;
  text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s;
}
#drop-zone:hover, #drop-zone.dragover { border-color: #3498db; background: rgba(52,152,219,0.04); }
#drop-zone h2 { font-size: 17px; margin-bottom: 4px; font-weight: 600; }
#drop-zone p { font-size: 13px; color: var(--text-dim); }
#drop-zone .hint { font-size: 11px; color: #aaa; margin-top: 8px; }
#file-inputs { display: flex; gap: 10px; }
#file-inputs button {
  padding: 8px 18px; border: 1px solid #bbb; border-radius: 6px;
  background: #fff; cursor: pointer; font-size: 13px;
}
#file-inputs button:hover { background: #f0f0f0; }

/* Status */
#status {
  display: flex; align-items: center; gap: 12px; padding: 2px 14px;
  background: #fff; border-top: 1px solid #ddd; font-size: 11px;
  color: var(--text-dim); flex-shrink: 0; min-height: 22px;
}
</style>
</head>
<body>

<div id="header">
  <span id="file-name">未加载音频 — 拖放文件或点击下方按钮</span>
  <span id="file-meta"></span>
  <span style="flex:1"></span>
  <span class="badge badge-none" id="badge-nvv">NVV</span>
</div>

<div id="controls">
  <button id="btn-load-audio" title="加载音频 (WAV/MP3)">📁 音频</button>
  <button id="btn-load-jsonl" title="加载时间戳 JSONL">📋 标注</button>
  <span class="sep"></span>
  <button id="btn-play" title="播放/暂停 (Space)">▶ 播放</button>
  <button id="btn-stop" title="停止">■</button>
  <span class="sep"></span>
  <span class="time-display" id="time-display">00:00.000 / 00:00.000</span>
  <span class="sep"></span>
  <button id="btn-zoom-in" title="放大 (+)">🔍＋</button>
  <button id="btn-zoom-out" title="缩小 (-)">🔍－</button>
  <button id="btn-zoom-full" title="显示全部 (0)">⊞ 全部</button>
  <button id="btn-zoom-sel" title="缩放到选区">⊡ 选区</button>
  <span class="zoom-pct" id="zoom-pct">100%</span>
  <span class="sep"></span>
  <button id="btn-spec" title="切换频谱图 (F)">📊 频谱</button>
  <label title="频谱动态范围"><span id="spec-dyn-label">60dB</span>
    <input type="range" id="spec-dyn" min="30" max="90" value="60">
  </label>
  <span class="sep"></span>
  <button id="btn-praat" title="用 Praat 打开 (需先生成 TextGrid)">🎵 Praat</button>
</div>

<div id="canvas-wrap">
  <canvas id="canvas"></canvas>
  <div id="drop-overlay">
    <div id="drop-zone">
      <h2>🎙 拖放音频 + JSONL 时间戳文件</h2>
      <p>支持 WAV / MP3 音频 + JSONL 标注文件</p>
      <div class="hint">或使用下方按钮分别选择文件</div>
    </div>
    <div id="file-inputs">
      <button id="btn-pick-audio">选择音频 (.wav .mp3)</button>
      <button id="btn-pick-jsonl">选择标注 (.jsonl)</button>
    </div>
  </div>
</div>

<div id="status">
  <span id="status-text">就绪 — 请加载音频和时间戳标注文件</span>
</div>

<div id="tooltip"></div>

<script>
// ═══════════════════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════════════════
const TIER_LABEL_W = 66;  // 左侧 tier 标签宽度 (px)
const RULER_H = 24;
const WAVEFORM_H = 200;
const ANNOTATION_H = 110; // 标注层 — 文本始终可见
const SPECTROGRAM_H = 200;
const OVERVIEW_H = 30;
const GAP = 3;
const PAD = 10;  // 右侧 padding

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
let audioBuffer = null, audioSampleRate = 0, audioPCM = null, audioName = '';
let annotations = [];   // {word, start_s, end_s, type}
let spectrogram = null; // {data, fftSize, hopSize, numFrames, numBins, sampleRate}
let showSpectrogram = false;
let specDynRange = 60;
let isPlaying = false, currentTime = 0;
let viewStart = 0, viewEnd = 10;
let selStart = null, selEnd = null;
let audioCtx = null, srcNode = null, pbStartCtx = 0, pbStartOff = 0;
let hoverTok = -1;
let dragging = null; // 'seek'|'select'|'pan'
let dragX = 0, dragT0 = 0, dragV0 = 0;

// ═══════════════════════════════════════════════════════════════
//  DOM
// ═══════════════════════════════════════════════════════════════
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvas-wrap');
const tip = document.getElementById('tooltip');
const overlay = document.getElementById('drop-overlay');
const dropZ = document.getElementById('drop-zone');
const stat = document.getElementById('status-text');
const timeDisp = document.getElementById('time-display');
const fnameEl = document.getElementById('file-name');
const fmetaEl = document.getElementById('file-meta');
const badgeNvv = document.getElementById('badge-nvv');
const zoomPct = document.getElementById('zoom-pct');

let W = 1200, H = 600, DPR = 1; // canvas dimensions (CSS px)

// ═══════════════════════════════════════════════════════════════
//  LAYOUT (returns Y positions in CSS px)
// ═══════════════════════════════════════════════════════════════
function layout() {
  let y = 0;
  const r1 = y; y += RULER_H;                          // ruler1
  const wf = y; y += WAVEFORM_H;                        // waveform
  const r2 = y; y += RULER_H;                           // ruler2
  const an = y; y += ANNOTATION_H;                      // annotations
  const r3 = y; y += RULER_H;                           // ruler3
  const spR = y; y += showSpectrogram ? RULER_H : 0;    // spec ruler
  const sp  = y; y += showSpectrogram ? SPECTROGRAM_H : 0; // spectrogram
  const ov = y; y += OVERVIEW_H;                        // overview
  return {r1,wf,r2,an,r3,spR,sp,ov,total:y};
}

// ═══════════════════════════════════════════════════════════════
//  COORDINATES (in CSS px, 0 at left edge of drawing area)
// ═══════════════════════════════════════════════════════════════
function drawW() { return W - TIER_LABEL_W - PAD; }
function t2x(t) {
  const dw = drawW();
  return TIER_LABEL_W + ((t - viewStart) / (viewEnd - viewStart)) * dw;
}
function x2t(x) {
  const dw = drawW();
  return viewStart + ((x - TIER_LABEL_W) / dw) * (viewEnd - viewStart);
}

// ═══════════════════════════════════════════════════════════════
//  AUDIO LOADING
// ═══════════════════════════════════════════════════════════════
async function loadAudio(buf, name) {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const dec = await audioCtx.decodeAudioData(buf);
  audioBuffer = dec; audioSampleRate = dec.sampleRate;
  if (dec.numberOfChannels > 1) {
    const l=dec.getChannelData(0), r=dec.getChannelData(1);
    audioPCM = new Float32Array(l.length);
    for(let i=0;i<l.length;i++) audioPCM[i]=(l[i]+r[i])*0.5;
  } else audioPCM = dec.getChannelData(0);
  audioName = name; viewStart=0; viewEnd=dec.duration;
  currentTime=0; spectrogram=null; selStart=null; selEnd=null;
  fnameEl.textContent=name;
  fmetaEl.textContent=`${dec.duration.toFixed(2)}s · ${audioSampleRate}Hz · ${dec.numberOfChannels}ch`;
  stat.textContent=`音频已加载: ${dec.duration.toFixed(2)}s`;
  overlay.classList.add('hidden');
  updatePlayBtn(); updateZoomPct(); resize(); render();
}
async function loadAudioFile(f) { const b=await f.arrayBuffer(); await loadAudio(b,f.name); }

// ═══════════════════════════════════════════════════════════════
//  JSONL LOADING
// ═══════════════════════════════════════════════════════════════
function loadAnno(text) {
  annotations=[];
  for(const ln of text.trim().split('\n')) {
    try{
      const o=JSON.parse(ln);
      const ss=o.start_s??(o.start_ms/1000);
      const es=o.end_s??(o.end_ms/1000);
      annotations.push({word:o.word||'',start_s:ss,end_s:es,type:o.type||'word'});
    }catch(e){}
  }
  const nNvv=annotations.filter(t=>t.type==='nvv').length;
  badgeNvv.textContent=nNvv>0?`${nNvv} NVV`:'无 NVV';
  badgeNvv.className='badge '+(nNvv>0?'badge-nvv':'badge-none');
  stat.textContent=`标注已加载: ${annotations.length} tokens (${nNvv} 个 NVV 事件)`;
  overlay.classList.add('hidden');
  resize(); render();
}
async function loadAnnoFile(f) { loadAnno(await f.text()); }

// ═══════════════════════════════════════════════════════════════
//  SPECTROGRAM
// ═══════════════════════════════════════════════════════════════
function hann(n){const w=new Float32Array(n);for(let i=0;i<n;i++)w[i]=0.5*(1-Math.cos(2*Math.PI*i/(n-1)));return w;}
function fft(re,im){
  const n=re.length;let j=0;
  for(let i=0;i<n-1;i++){if(i<j){[re[i],re[j]]=[re[j],re[i]];[im[i],im[j]]=[im[j],im[i]];}let k=n>>1;while(k<=j){j-=k;k>>=1;}j+=k;}
  for(let len=2;len<=n;len<<=1){
    const h=len>>1, ang=-2*Math.PI/len, wR=Math.cos(ang), wI=Math.sin(ang);
    for(let i=0;i<n;i+=len){let cR=1,cI=0;for(let k=0;k<h;k++){
      const r1=re[i+k],i1=im[i+k],r2=re[i+k+h]*cR-im[i+k+h]*cI,i2=re[i+k+h]*cI+im[i+k+h]*cR;
      re[i+k]=r1+r2;im[i+k]=i1+i2;re[i+k+h]=r1-r2;im[i+k+h]=i1-i2;
      const nR=cR*wR-cI*wI;cI=cR*wI+cI*wR;cR=nR;
    }}
  }
}
function computeSpectrogram(cb){
  if(!audioPCM)return;
  const fS=1024, hS=fS>>2, nF=Math.floor((audioPCM.length-fS)/hS)+1, nB=fS>>1;
  const win=hann(fS),data=[],re=new Float32Array(fS),im=new Float32Array(fS);
  for(let f=0;f<nF;f++){
    const off=f*hS;
    for(let i=0;i<fS;i++){re[i]=audioPCM[off+i]*win[i];im[i]=0;}
    fft(re,im);const mag=new Float32Array(nB);
    for(let i=0;i<nB;i++)mag[i]=Math.sqrt(re[i]*re[i]+im[i]*im[i]);
    data.push(mag);
    if(cb&&f%500===0)cb(f,nF);
  }
  spectrogram={data,fS,hS,nF,nB,sampleRate:audioSampleRate};
  if(cb)cb(nF,nF);
}

// ═══════════════════════════════════════════════════════════════
//  TOKEN COLOR
// ═══════════════════════════════════════════════════════════════
function tColor(type){
  switch(type){
    case'nvv':return{bg:'#c8e6c9',border:'#43a047',text:'#1b5e20'};
    case'punct':return{bg:'#fff9c4',border:'#f9a825',text:'#827717'};
    case'pause_marker':return{bg:'#eceff1',border:'#90a4ae',text:'#546e7a'};
    case'special':return{bg:'#e1bee7',border:'#ab47bc',text:'#6a1b9a'};
    default:return{bg:'#ffffff',border:'#bdbdbd',text:'#222222'};
  }
}

// ═══════════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════════
function drawRuler(y){
  const dw=drawW();
  ctx.fillStyle='#e0e0e0';ctx.fillRect(0,y,W,RULER_H);
  ctx.fillStyle='#555';ctx.font='10px Consolas,monospace';
  ctx.textAlign='center';ctx.textBaseline='bottom';
  const dur=viewEnd-viewStart;
  let step=dur>60?10:dur>10?1:dur>2?0.2:dur>0.5?0.05:0.01;
  for(let t=Math.floor(viewStart/step)*step;t<=viewEnd;t+=step){
    const x=t2x(t);if(x<TIER_LABEL_W||x>W)continue;
    ctx.strokeStyle='#bbb';ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y+7);ctx.stroke();
    ctx.fillText(t.toFixed(step<0.1?3:step<1?2:1)+'s',x,y+RULER_H-2);
  }
  ctx.textAlign='start';

  // tier label area
  ctx.fillStyle='#f5f5f5';ctx.fillRect(0,y,TIER_LABEL_W,RULER_H);
  ctx.strokeStyle='#ccc';ctx.strokeRect(0,y,TIER_LABEL_W,RULER_H);
}

function drawWaveform(y){
  if(!audioPCM)return;
  const dw=drawW(), h=WAVEFORM_H, cy=y+h/2;
  // bg
  ctx.fillStyle='#fdfdfd';ctx.fillRect(TIER_LABEL_W,y,dw+PAD,h);

  // selection
  if(selStart!=null&&selEnd!=null){
    const sx=t2x(Math.min(selStart,selEnd)), ex=t2x(Math.max(selStart,selEnd));
    ctx.fillStyle='rgba(52,152,219,0.1)';ctx.fillRect(sx,y,ex-sx,h);
  }

  ctx.save();
  ctx.beginPath();ctx.rect(TIER_LABEL_W,y,dw+PAD,h);ctx.clip();

  const ss=Math.floor(viewStart*audioSampleRate);
  const es=Math.ceil(viewEnd*audioSampleRate);
  const tot=es-ss, spp=Math.max(1,Math.floor(tot/dw));

  ctx.strokeStyle='#2c3e50';ctx.lineWidth=1;
  ctx.beginPath();
  for(let px=0;px<dw;px++){
    const s0=ss+Math.floor(px*spp), s1=Math.min(s0+spp,audioPCM.length);
    let mn=1,mx=-1;
    for(let s=s0;s<s1;s++){const v=audioPCM[s];if(v<mn)mn=v;if(v>mx)mx=v;}
    if(mn<=mx){ctx.moveTo(TIER_LABEL_W+px+.5,cy+mn*h*.44);ctx.lineTo(TIER_LABEL_W+px+.5,cy+mx*h*.44);}
  }
  ctx.stroke();

  // zero line
  ctx.strokeStyle='rgba(0,0,0,0.12)';ctx.lineWidth=.5;
  ctx.beginPath();ctx.moveTo(TIER_LABEL_W,cy);ctx.lineTo(TIER_LABEL_W+dw,cy);ctx.stroke();
  ctx.restore();

  // border
  ctx.strokeStyle='#ccc';ctx.lineWidth=1;ctx.strokeRect(TIER_LABEL_W,y,dw+PAD,h);

  // tier label
  ctx.fillStyle='#f5f5f5';ctx.fillRect(0,y,TIER_LABEL_W,h);
  ctx.fillStyle='#555';ctx.font='bold 11px "Segoe UI","Microsoft YaHei",sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('波形',TIER_LABEL_W/2,y+h/2);
  ctx.strokeStyle='#ccc';ctx.strokeRect(0,y,TIER_LABEL_W,h);
  ctx.textAlign='start';
}

function drawAnnotations(y){
  if(!annotations.length)return;
  const dw=drawW(), h=ANNOTATION_H;
  const boxH=28, boxTop=y+4;                   // 上层: 色块
  const textTop=y+boxH+8, textH=h-boxH-14;      // 下层: 文本始终可见

  // bg
  ctx.fillStyle='#fafafa';ctx.fillRect(TIER_LABEL_W,y,dw+PAD,h);

  // selection highlight
  if(selStart!=null&&selEnd!=null){
    const sx=t2x(Math.min(selStart,selEnd)), ex=t2x(Math.max(selStart,selEnd));
    ctx.fillStyle='rgba(52,152,219,0.06)';ctx.fillRect(sx,y,ex-sx,h);
  }

  // 分隔线: boxes / text
  ctx.strokeStyle='#e0e0e0';ctx.lineWidth=.5;
  ctx.beginPath();ctx.moveTo(TIER_LABEL_W,y+boxH+4);ctx.lineTo(TIER_LABEL_W+dw,y+boxH+4);ctx.stroke();

  ctx.save();
  ctx.beginPath();ctx.rect(TIER_LABEL_W,y,dw+PAD,h);ctx.clip();

  // ── 上层: 色块 ──
  for(const tok of annotations){
    let x1=t2x(tok.start_s), x2=t2x(tok.end_s);
    if(x2<TIER_LABEL_W-1||x1>W+1)continue;
    x1=Math.max(x1,TIER_LABEL_W);x2=Math.min(x2,W);
    const tw=x2-x1, col=tColor(tok.type);
    if(tw>=1.5){
      ctx.fillStyle=col.bg;ctx.fillRect(x1,boxTop,tw,boxH);
      ctx.strokeStyle=col.border;ctx.lineWidth=.5;
      ctx.strokeRect(x1+.25,boxTop+.25,tw-.5,boxH-.5);
    }else{
      ctx.strokeStyle=col.border;ctx.lineWidth=.5;
      ctx.beginPath();ctx.moveTo(x1,boxTop);ctx.lineTo(x1,boxTop+boxH);ctx.stroke();
    }
  }

  // ── 下层: 文本始终显示 ──
  const drawn=[];
  ctx.textBaseline='middle';
  for(const tok of annotations){
    let x1=t2x(tok.start_s), x2=t2x(tok.end_s);
    if(x2<TIER_LABEL_W+2||x1>W)continue;
    x1=Math.max(x1,TIER_LABEL_W);x2=Math.min(x2,W);
    const tw=x2-x1, col=tColor(tok.type);
    if(tw<10)continue; // 太窄不显示文字

    ctx.font='600 11px "Microsoft YaHei","Segoe UI",sans-serif';
    const tw2=ctx.measureText(tok.word).width;

    // 计算 label 位置: 优先居中, 如果溢出则贴左
    let lx=x1+tw/2-tw2/2;
    if(lx<TIER_LABEL_W+1)lx=TIER_LABEL_W+1;
    if(lx+tw2>TIER_LABEL_W+dw-1)lx=TIER_LABEL_W+dw-tw2-1;

    // 轻微碰撞检测: 仅跳过完全重叠的
    let blocked=false;
    for(const d of drawn){
      if(Math.abs(lx+tw2/2-d.cx)<(tw2+d.w)/2+1){
        blocked=true;break;
      }
    }
    if(blocked)continue;

    ctx.fillStyle=col.text;
    ctx.fillText(tok.word, lx, textTop+textH/2);
    drawn.push({cx:lx+tw2/2, w:tw2});
  }
  ctx.restore();

  // border
  ctx.strokeStyle='#ccc';ctx.lineWidth=1;ctx.strokeRect(TIER_LABEL_W,y,dw+PAD,h);

  // tier label
  ctx.fillStyle='#f5f5f5';ctx.fillRect(0,y,TIER_LABEL_W,h);
  ctx.fillStyle='#555';ctx.font='bold 11px "Segoe UI","Microsoft YaHei",sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('words',TIER_LABEL_W/2,y+boxH/2+2);
  ctx.fillText('标注层',TIER_LABEL_W/2,y+boxH+8+textH/2);
  ctx.strokeStyle='#ccc';ctx.strokeRect(0,y,TIER_LABEL_W,h);
  ctx.textAlign='start';

  // legend
  if(annotations.some(t=>t.type==='nvv')){
    ctx.fillStyle='#999';ctx.font='9px "Microsoft YaHei",sans-serif';
    ctx.textAlign='right';
    ctx.fillText('■ NVV 副语言  ■ 标点  ■ 停顿  □ 字词 | 文本始终可见',TIER_LABEL_W+dw-6,y+h-4);
    ctx.textAlign='start';
  }
}

function drawSpectrogram(y){
  if(!spectrogram||!showSpectrogram)return;
  const{data,hS,nB,sampleRate:sr}=spectrogram;
  const dw=drawW(), h=SPECTROGRAM_H, fps=Math.max(1,Math.floor(data.length/dw));
  const nyq=sr/2;

  // bg
  ctx.fillStyle='#1a1a2e';ctx.fillRect(TIER_LABEL_W,y,dw+PAD,h);

  // render each column
  for(let px=0;px<dw;px++){
    const fi=Math.floor(px*fps);
    if(fi>=data.length)continue;
    const mag=data[fi];
    for(let py=0;py<h;py++){
      const bi=Math.floor((1-py/h)*nB);
      if(bi>=mag.length)continue;
      const db=20*Math.log10(Math.max(mag[bi],1e-10));
      const v=Math.max(0,Math.min(255,Math.round((1+db/specDynRange)*255)));
      ctx.fillStyle=`rgb(${v},${v},${v})`;
      ctx.fillRect(TIER_LABEL_W+px,y+py,1,1);
    }
  }

  // freq labels
  ctx.fillStyle='rgba(255,255,255,0.55)';ctx.font='9px Consolas,monospace';
  ctx.textAlign='left';
  for(const f of[0,1000,2000,3000,4000,5000,6000,7000,8000]){
    if(f>nyq)break;
    const py=y+h-(f/nyq)*h;
    ctx.fillText(f>=1000?`${f/1000}k`:f,TIER_LABEL_W+3,py-2);
  }
  ctx.textAlign='start';

  // border
  ctx.strokeStyle='#333';ctx.strokeRect(TIER_LABEL_W,y,dw+PAD,h);

  // tier label
  ctx.fillStyle='#1a1a2e';ctx.fillRect(0,y,TIER_LABEL_W,h);
  ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='bold 11px "Segoe UI","Microsoft YaHei",sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('频谱',TIER_LABEL_W/2,y+h/2);
  ctx.strokeStyle='#333';ctx.strokeRect(0,y,TIER_LABEL_W,h);
  ctx.textAlign='start';
}

function drawPlayhead(){
  const x=t2x(currentTime);if(x<TIER_LABEL_W||x>W)return;
  const tot=layout().total;
  ctx.save();
  ctx.strokeStyle='#e74c3c';ctx.lineWidth=1.8;ctx.setLineDash([5,4]);
  ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,tot);ctx.stroke();
  ctx.setLineDash([]);
  // triangle handle
  ctx.fillStyle='#e74c3c';
  ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x-6,RULER_H*.35);ctx.lineTo(x+6,RULER_H*.35);ctx.closePath();ctx.fill();
  ctx.restore();
}

function drawOverview(y){
  if(!audioPCM)return;
  const dw=drawW(), h=OVERVIEW_H, dur=audioBuffer.duration;
  const spp=Math.max(1,Math.floor(audioPCM.length/dw));
  const my=y+h/2;

  ctx.fillStyle='#e8e8e8';ctx.fillRect(TIER_LABEL_W,y,dw+PAD,h);

  ctx.strokeStyle='#999';ctx.lineWidth=.5;
  ctx.beginPath();
  for(let px=0;px<dw;px++){
    const s0=Math.floor(px*spp),s1=Math.min(s0+spp,audioPCM.length);
    let mn=1,mx=-1;
    for(let s=s0;s<s1;s++){const v=audioPCM[s];if(v<mn)mn=v;if(v>mx)mx=v;}
    if(mn<=mx){ctx.moveTo(TIER_LABEL_W+px,my+mn*h*.35);ctx.lineTo(TIER_LABEL_W+px,my+mx*h*.35);}
  }
  ctx.stroke();

  // viewport rectangle
  const vx1=TIER_LABEL_W+(viewStart/dur)*dw, vx2=TIER_LABEL_W+(viewEnd/dur)*dw;
  ctx.fillStyle='rgba(52,152,219,0.2)';ctx.fillRect(vx1,y,vx2-vx1,h);
  ctx.strokeStyle='rgba(52,152,219,0.6)';ctx.lineWidth=1.2;ctx.strokeRect(vx1,y,vx2-vx1,h);

  // selection
  if(selStart!=null&&selEnd!=null){
    const sx=TIER_LABEL_W+(Math.min(selStart,selEnd)/dur)*dw;
    const ex=TIER_LABEL_W+(Math.max(selStart,selEnd)/dur)*dw;
    ctx.fillStyle='rgba(231,76,60,0.18)';ctx.fillRect(sx,y,ex-sx,h);
  }

  // time labels
  ctx.fillStyle='#777';ctx.font='9px Consolas,monospace';
  ctx.textAlign='left';ctx.fillText('0',TIER_LABEL_W+3,y+h-5);
  ctx.textAlign='right';ctx.fillText(dur.toFixed(1)+'s',TIER_LABEL_W+dw-3,y+h-5);
  ctx.textAlign='start';

  // border
  ctx.strokeStyle='#ccc';ctx.strokeRect(TIER_LABEL_W,y,dw+PAD,h);

  // label
  ctx.fillStyle='#eee';ctx.fillRect(0,y,TIER_LABEL_W,h);
  ctx.fillStyle='#777';ctx.font='10px "Segoe UI","Microsoft YaHei",sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('导航',TIER_LABEL_W/2,y+h/2);
  ctx.strokeStyle='#ccc';ctx.strokeRect(0,y,TIER_LABEL_W,h);
  ctx.textAlign='start';
}

function render(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#e8e8e8';ctx.fillRect(0,0,W,H);
  const L=layout();
  drawRuler(L.r1); drawWaveform(L.wf); drawRuler(L.r2);
  drawAnnotations(L.an);
  if(showSpectrogram&&spectrogram){drawRuler(L.r3);drawRuler(L.spR);drawSpectrogram(L.sp);}
  drawOverview(L.ov);
  drawPlayhead();
}

// ═══════════════════════════════════════════════════════════════
//  RESIZE (with proper HiDPI)
// ═══════════════════════════════════════════════════════════════
function resize(){
  const rect=wrap.getBoundingClientRect();
  DPR=window.devicePixelRatio||1;
  W=rect.width; H=Math.max(layout().total, rect.height);
  canvas.width=W*DPR; canvas.height=H*DPR;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  // Enable text anti-aliasing
  ctx.imageSmoothingEnabled=true;
  render();
}

// ═══════════════════════════════════════════════════════════════
//  PLAYBACK
// ═══════════════════════════════════════════════════════════════
function play(){
  if(!audioBuffer)return;
  if(isPlaying){pause();return;}
  if(currentTime>=audioBuffer.duration-.01){
    currentTime=selStart!=null?Math.min(selStart,selEnd):0;
  }
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended')audioCtx.resume();
  srcNode=audioCtx.createBufferSource();
  srcNode.buffer=audioBuffer;srcNode.connect(audioCtx.destination);
  const off=currentTime;
  const limit=selEnd!=null?Math.max(selStart,selEnd):audioBuffer.duration;
  srcNode.start(0,off);pbStartCtx=audioCtx.currentTime;pbStartOff=off;
  isPlaying=true;
  // 精确停止: Web Audio API 调度级精度, 不受 rAF ~16ms 帧率影响
  srcNode.stop(audioCtx.currentTime+(limit-off));
  srcNode.onended=()=>{
    if(isPlaying){
      currentTime=limit;isPlaying=false;updatePlayBtn();render();
    }
  };
  updatePlayBtn();requestAnimationFrame(pbLoop);
}
function pause(){
  if(!isPlaying)return;
  currentTime=audioCtx.currentTime-pbStartCtx+pbStartOff;
  isPlaying=false;  // 先设 false, 避免 onended 回调重复处理
  if(srcNode)try{srcNode.stop();}catch(e){}
  updatePlayBtn();render();
}
function stop(){
  if(isPlaying){isPlaying=false;if(srcNode)try{srcNode.stop();}catch(e){}}
  currentTime=0;updatePlayBtn();render();
}
function updatePlayBtn(){
  document.getElementById('btn-play').textContent=isPlaying?'⏸ 暂停':'▶ 播放';
}
function pbLoop(){
  if(!isPlaying)return;
  currentTime=audioCtx.currentTime-pbStartCtx+pbStartOff;
  updateTimeDisp();render();
  requestAnimationFrame(pbLoop);
}
function updateTimeDisp(){
  const fmt=s=>{const m=Math.floor(s/60),sec=s-m*60;return`${String(m).padStart(2,'0')}:${sec.toFixed(3).padStart(6,'0')}`;};
  timeDisp.textContent=fmt(currentTime)+' / '+fmt(audioBuffer?audioBuffer.duration:0);
}
function updateZoomPct(){
  if(!audioBuffer)return;
  const pct=Math.round(audioBuffer.duration/(viewEnd-viewStart));
  zoomPct.textContent=pct>500?`${(audioBuffer.duration/(viewEnd-viewStart)).toFixed(0)}×`:pct+'%';
}

// ═══════════════════════════════════════════════════════════════
//  INTERACTION
// ═══════════════════════════════════════════════════════════════
function canvasPos(e){const r=canvas.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top};}
function findTok(t){
  for(let i=0;i<annotations.length;i++){
    if(t>=annotations[i].start_s-.01&&t<annotations[i].end_s+.01)return i;
  }
  return-1;
}

canvas.addEventListener('mousedown',e=>{
  const p=canvasPos(e),t=Math.max(0,Math.min(x2t(p.x),audioBuffer?audioBuffer.duration:0));
  const L=layout();
  if(p.y>=L.ov){
    // overview: jump viewport
    const dur=audioBuffer.duration, half=(viewEnd-viewStart)/2;
    const nc=(p.x/drawW())*dur;
    viewStart=Math.max(0,nc-half);viewEnd=Math.min(dur,nc+half);
    updateZoomPct();render();return;
  }
  dragging={};dragX=p.x;dragT0=t;dragV0=viewStart;
  if(e.shiftKey&&selStart!=null){selEnd=t;dragging.type='select';}
  else if(e.altKey||e.metaKey){dragging.type='pan';}
  else{
    seek(t);selStart=t;selEnd=null;dragging.type='select';
  }
  render();
});

canvas.addEventListener('mousemove',e=>{
  const p=canvasPos(e),t=x2t(p.x);
  if(dragging){
    if(dragging.type==='select'){
      selEnd=Math.max(0,Math.min(t,audioBuffer?audioBuffer.duration:0));render();
    }else if(dragging.type==='pan'){
      const dt=dragT0-t, ns=dragV0+dt, dur=viewEnd-viewStart;
      viewStart=Math.max(0,ns);viewEnd=Math.min(audioBuffer.duration,viewStart+dur);
      if(viewEnd===audioBuffer.duration)viewStart=Math.max(0,viewEnd-dur);
      updateZoomPct();render();
    }
    return;
  }
  const ti=findTok(t);
  if(ti>=0&&ti!==hoverTok){
    hoverTok=ti;const tok=annotations[ti];
    const tn={word:'字词',punct:'标点',nvv:'NVV副语言事件',pause_marker:'≥500ms停顿标记',special:'特殊标签'};
    const dur=tok.end_s-tok.start_s;
    tip.innerHTML=`<b style="font-size:14px">${tok.word}</b><br>
      <span style="color:#aaa">类型:</span> ${tn[tok.type]||tok.type}<br>
      <span style="color:#aaa">起始:</span> ${tok.start_s.toFixed(3)}s &nbsp;(${(tok.start_s*1000)|0}ms)<br>
      <span style="color:#aaa">结束:</span> ${tok.end_s.toFixed(3)}s &nbsp;(${(tok.end_s*1000)|0}ms)<br>
      <span style="color:#aaa">时长:</span> ${(dur*1000)|0}ms`;
    tip.style.display='block';tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-75)+'px';
  }else if(ti<0){hoverTok=-1;tip.style.display='none';}
});

canvas.addEventListener('mouseup',()=>{
  if(dragging&&dragging.type==='select'&&selStart!=null&&selEnd!=null){
    if(Math.abs(selStart-selEnd)<.01){selStart=null;selEnd=null;}
  }
  dragging=null;render();
});

canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const p=canvasPos(e),t=x2t(p.x);
  const f=e.deltaY>0?1.35:1/1.35;
  const dur=viewEnd-viewStart, nd=Math.max(.03,Math.min(audioBuffer.duration,dur*f));
  const r=(t-viewStart)/dur;
  viewStart=Math.max(0,t-nd*r);viewEnd=Math.min(audioBuffer.duration,viewStart+nd);
  if(viewEnd===audioBuffer.duration)viewStart=Math.max(0,viewEnd-nd);
  updateZoomPct();render();
},{passive:false});

canvas.addEventListener('dblclick',e=>{
  const p=canvasPos(e),L=layout();
  if(p.y>=L.ov)return;
  const t=x2t(p.x),ti=findTok(t);
  if(ti>=0){
    const tok=annotations[ti];
    selStart=tok.start_s;selEnd=tok.end_s;currentTime=tok.start_s;
    render();play();
  }
});

// ═══════════════════════════════════════════════════════════════
//  KEYBOARD
// ═══════════════════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  switch(e.key){
    case' ':e.preventDefault();isPlaying?pause():play();break;
    case'Escape':stop();selStart=null;selEnd=null;render();break;
    case'ArrowLeft':e.preventDefault();seek(currentTime-(e.shiftKey?5:1));render();break;
    case'ArrowRight':e.preventDefault();seek(currentTime+(e.shiftKey?5:1));render();break;
    case'=':case'+':e.preventDefault();zoomIn();break;
    case'-':e.preventDefault();zoomOut();break;
    case'0':e.preventDefault();zoomFull();break;
    case'f':case'F':if(!e.ctrlKey&&!e.metaKey){toggleSpec();}break;
  }
});

function seek(t){
  const wp=isPlaying;
  if(isPlaying){isPlaying=false;if(srcNode)try{srcNode.stop();}catch(e){}}
  currentTime=Math.max(0,Math.min(t,audioBuffer?audioBuffer.duration:0));
  updateTimeDisp();if(wp)setTimeout(()=>play(),40);
}
function zoomIn(){const d=viewEnd-viewStart,c=(viewStart+viewEnd)/2,nd=d/1.5;viewStart=Math.max(0,c-nd/2);viewEnd=Math.min(audioBuffer.duration,viewStart+nd);updateZoomPct();render();}
function zoomOut(){const d=viewEnd-viewStart,c=(viewStart+viewEnd)/2,nd=d*1.5;viewStart=Math.max(0,c-nd/2);viewEnd=Math.min(audioBuffer.duration,viewStart+nd);updateZoomPct();render();}
function zoomFull(){viewStart=0;viewEnd=audioBuffer.duration;updateZoomPct();render();}
function zoomSel(){if(selStart==null)return;viewStart=Math.min(selStart,selEnd);viewEnd=Math.max(selStart,selEnd);const p=(viewEnd-viewStart)*.1;viewStart=Math.max(0,viewStart-p);viewEnd=Math.min(audioBuffer.duration,viewEnd+p);updateZoomPct();render();}

async function toggleSpec(){
  showSpectrogram=!showSpectrogram;
  document.getElementById('btn-spec').classList.toggle('active',showSpectrogram);
  if(showSpectrogram&&!spectrogram){
    stat.textContent='计算频谱图中...';
    document.getElementById('btn-spec').textContent='⏳ ...';document.getElementById('btn-spec').disabled=true;
    await new Promise(r=>setTimeout(r,30));
    computeSpectrogram((done,total)=>{
      if(done===total){stat.textContent=`频谱图完成: ${spectrogram.nF}帧×${spectrogram.nB}bins`;}
    });
    document.getElementById('btn-spec').textContent='📊 频谱';document.getElementById('btn-spec').disabled=false;
  }
  resize();
}

// ═══════════════════════════════════════════════════════════════
//  BUTTONS
// ═══════════════════════════════════════════════════════════════
document.getElementById('btn-play').onclick=()=>isPlaying?pause():play();
document.getElementById('btn-stop').onclick=stop;
document.getElementById('btn-zoom-in').onclick=zoomIn;
document.getElementById('btn-zoom-out').onclick=zoomOut;
document.getElementById('btn-zoom-full').onclick=zoomFull;
document.getElementById('btn-zoom-sel').onclick=zoomSel;
document.getElementById('btn-spec').onclick=toggleSpec;
document.getElementById('spec-dyn').oninput=e=>{specDynRange=+e.target.value;document.getElementById('spec-dyn-label').textContent=specDynRange+'dB';if(showSpectrogram)render();};
document.getElementById('btn-praat').onclick=()=>{
  alert('用 Praat 打开 TextGrid:\n\n1. 运行 python export_mfa_textgrid.py 生成 TextGrid\n2. python visualize.py --praat-dir output/xiaoyuan_mfa/textgrids/\n\n或手动:\n  Praat → Open → Read from file → 选择 .TextGrid + .wav\n  → 同时选中 → View & Edit');
};

function fileBtn(id,accept,cb){
  document.getElementById(id).onclick=()=>{
    const inp=document.createElement('input');inp.type='file';inp.accept=accept;
    inp.onchange=e=>{if(e.target.files[0])cb(e.target.files[0]);};inp.click();
  };
}
fileBtn('btn-load-audio','.wav,.mp3,.flac,.ogg',loadAudioFile);
fileBtn('btn-load-jsonl','.jsonl,.json',async f=>{await loadAnnoFile(f);});
fileBtn('btn-pick-audio','.wav,.mp3,.flac,.ogg',loadAudioFile);
fileBtn('btn-pick-jsonl','.jsonl,.json',async f=>{await loadAnnoFile(f);});

// ═══════════════════════════════════════════════════════════════
//  DRAG & DROP
// ═══════════════════════════════════════════════════════════════
dropZ.addEventListener('dragover',e=>{e.preventDefault();dropZ.classList.add('dragover');});
dropZ.addEventListener('dragleave',()=>dropZ.classList.remove('dragover'));
dropZ.addEventListener('drop',async e=>{
  e.preventDefault();dropZ.classList.remove('dragover');
  for(const f of Array.from(e.dataTransfer.files)){
    if(f.name.match(/\.(wav|mp3|flac|ogg)$/i))await loadAudioFile(f);
    else if(f.name.match(/\.(jsonl|json)$/i)){await loadAnnoFile(f);}
  }
});
document.addEventListener('dragover',e=>{e.preventDefault();if(!audioBuffer)overlay.classList.remove('hidden');});
document.addEventListener('drop',async e=>{
  e.preventDefault();if(e.target===dropZ)return;
  for(const f of Array.from(e.dataTransfer.files)){
    if(f.name.match(/\.(wav|mp3|flac|ogg)$/i))await loadAudioFile(f);
    else if(f.name.match(/\.(jsonl|json)$/i)){await loadAnnoFile(f);}
  }
});

// ═══════════════════════════════════════════════════════════════
//  RESIZE OBSERVER
// ═══════════════════════════════════════════════════════════════
window.addEventListener('resize',resize);
new ResizeObserver(resize).observe(wrap);

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════
async function init(){
  resize();
  updateTimeDisp();

  const params=new URLSearchParams(window.location.search);
  const ap=params.get('audio'), jp=params.get('jsonl');

  if(ap)try{
    const r=await fetch(ap);
    if(r.ok){const b=await r.arrayBuffer();const n=ap.split('/').pop().split('\\').pop();await loadAudio(b,decodeURIComponent(n));}
  }catch(e){console.warn('Auto-load audio failed:',e);}

  if(jp)try{
    const r=await fetch(jp);
    if(r.ok){loadAnno(await r.text());}
  }catch(e){console.warn('Auto-load JSONL failed:',e);}

  if(!audioBuffer)overlay.classList.remove('hidden');
}
init();
</script>
